{% extends "base.html" %}

{% block title %}Server Error - Comment Sentiment Analysis{% endblock %}

<div class="container">

            <i class="fas fa-server fa-5x text-danger mb-4"></i>
            <h1 class="display-1">500</h1>

        </div>
    </div>
</div>
{% endblock %}
